<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>HR Fitness</title>
  <style>
:root{--bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#22c55e;--accent-dark:#15803d;--danger:#dc2626;--shadow:0 8px 25px rgba(17,24,39,.08)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding-bottom:88px}.dark{--bg:#090f1a;--card:#121a27;--text:#f9fafb;--muted:#9ca3af;--line:#283244;--shadow:none}.app-header{display:flex;justify-content:space-between;align-items:center;padding:24px 20px 10px;max-width:780px;margin:auto}.app-header h1,.section-title h2{margin:0}.eyebrow{font-size:11px;letter-spacing:1.4px;color:var(--accent);font-weight:800;margin:0 0 4px}main{max-width:780px;margin:auto;padding:10px 16px}.view{display:none}.view.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.hero{padding:24px}.hero h2{font-size:28px;margin:6px 0}.hero p{color:var(--muted);margin:0 0 20px}.primary,.secondary,.danger{border:0;border-radius:13px;padding:14px 16px;font-weight:750;font-size:15px;cursor:pointer}.primary{background:var(--accent);color:#052e16}.primary:active{background:var(--accent-dark);color:white}.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.danger{background:#fee2e2;color:var(--danger)}.wide{display:block;width:100%;margin-top:12px;text-align:center}.small{padding:8px 10px;font-size:13px}.icon-btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;width:42px;height:42px;font-size:20px}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 26px}.stat{padding:14px;text-align:center}.stat strong{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}h3{margin:18px 0 10px}.routine-list{display:grid;gap:12px}.routine{padding:18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.routine p{margin:4px 0 0;color:var(--muted);font-size:13px}.routine .arrow{font-size:22px;color:var(--muted)}.section-title{display:flex;gap:12px;align-items:center;margin:4px 0 18px}.exercise{padding:16px;margin-bottom:14px}.exercise-head{display:flex;justify-content:space-between;gap:12px;align-items:start}.exercise-name{margin:0}.last-session{margin:4px 0 12px;color:var(--muted);font-size:12px}.sets-head,.set-row{display:grid;grid-template-columns:50px 1fr 1fr 40px;gap:8px;align-items:center}.sets-head{font-size:11px;color:var(--muted);padding:8px 4px}.set-row{margin:8px 0}.set-number{text-align:center;font-weight:700}.set-row input,.form-card input{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:11px;padding:12px;font-size:16px}.remove-set{border:0;background:transparent;color:var(--danger);font-size:20px}.sticky-actions{position:sticky;bottom:78px;background:linear-gradient(transparent,var(--bg) 30%);padding:28px 0 8px}.sticky-actions button{width:100%}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:20;padding-bottom:env(safe-area-inset-bottom)}.nav-item{width:33.33%;max-width:260px;border:0;background:transparent;color:var(--muted);padding:10px;font-size:20px}.nav-item span{display:block;font-size:11px;margin-top:3px}.nav-item.active{color:var(--accent)}.history-item{padding:16px;margin-bottom:12px}.history-item h3{margin:0 0 4px}.history-item p{margin:3px 0;color:var(--muted);font-size:13px}.history-details{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px}.form-card{padding:18px}.form-card label{display:block;font-size:13px;font-weight:700;margin-bottom:14px}.form-card input{margin-top:6px}.file-label{cursor:pointer}@media(max-width:420px){.hero h2{font-size:24px}.stats-grid{gap:6px}.stat{padding:11px 5px}.stat strong{font-size:18px}}

  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">ENTRENAMIENTO PERSONAL</p>
      <h1>HR Fitness</h1>
    </div>
    <button id="themeBtn" class="icon-btn" aria-label="Cambiar tema">☾</button>
  </header>

  <main>
    <section id="homeView" class="view active">
      <div class="hero card">
        <div>
          <span>Hola, Hernán</span>
          <h2>¿Listo para entrenar?</h2>
          <p>Registra cada serie y supera tu último entrenamiento.</p>
        </div>
        <button id="startBtn" class="primary">Iniciar entrenamiento</button>
      </div>

      <div class="stats-grid">
        <div class="stat card"><strong id="monthWorkouts">0</strong><span>Este mes</span></div>
        <div class="stat card"><strong id="totalSets">0</strong><span>Series totales</span></div>
        <div class="stat card"><strong id="totalVolume">0</strong><span>lb de volumen</span></div>
      </div>

      <h3>Rutinas</h3>
      <div id="routineList" class="routine-list"></div>
    </section>

    <section id="workoutView" class="view">
      <div class="section-title">
        <button id="backBtn" class="icon-btn">←</button>
        <div><p class="eyebrow">ENTRENAMIENTO</p><h2 id="workoutTitle"></h2></div>
      </div>
      <div id="exerciseList"></div>
      <div class="sticky-actions">
        <button id="finishBtn" class="primary">Guardar entrenamiento</button>
      </div>
    </section>

    <section id="historyView" class="view">
      <div class="section-title"><div><p class="eyebrow">PROGRESO</p><h2>Historial</h2></div></div>
      <div id="historyList"></div>
    </section>

    <section id="settingsView" class="view">
      <div class="section-title"><div><p class="eyebrow">PERSONALIZACIÓN</p><h2>Ajustes</h2></div></div>
      <div class="card form-card">
        <label>Nombre<input id="userName" value="Hernán" /></label>
        <label>Peso corporal (lb)<input id="bodyWeight" type="number" inputmode="decimal" placeholder="202" /></label>
        <label>Objetivo (lb)<input id="goalWeight" type="number" inputmode="decimal" placeholder="177" /></label>
        <button id="saveSettings" class="primary">Guardar ajustes</button>
      </div>
      <button id="exportBtn" class="secondary wide">Exportar copia de seguridad</button>
      <label class="secondary wide file-label">Importar copia<input id="importInput" type="file" accept="application/json" hidden /></label>
      <button id="resetBtn" class="danger wide">Borrar todos los datos</button>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-view="homeView" class="nav-item active">⌂<span>Inicio</span></button>
    <button data-view="historyView" class="nav-item">▥<span>Historial</span></button>
    <button data-view="settingsView" class="nav-item">⚙<span>Ajustes</span></button>
  </nav>

  <template id="exerciseTemplate">
    <article class="exercise card">
      <div class="exercise-head">
        <div><h3 class="exercise-name"></h3><p class="last-session">Sin registros anteriores</p></div>
        <button class="add-set secondary small">+ Serie</button>
      </div>
      <div class="sets-head"><span>Serie</span><span>Peso (lb)</span><span>Reps</span><span></span></div>
      <div class="sets-list"></div>
    </article>
  </template>

  <script>
const defaultRoutines=[
 {name:'Día 1 – Pecho y Tríceps',exercises:['Press de banca','Press inclinado con mancuernas','Aperturas en máquina','Fondos asistidos','Extensión de tríceps en polea']},
 {name:'Día 2 – Espalda y Bíceps',exercises:['Jalón al pecho','Remo sentado','Remo con mancuerna','Curl de bíceps con barra','Curl martillo']},
 {name:'Día 3 – Pierna',exercises:['Sentadilla','Prensa de pierna','Extensión de cuádriceps','Curl femoral','Elevación de pantorrilla']},
 {name:'Día 4 – Hombro y Abdomen',exercises:['Press de hombro con barra','Elevaciones laterales','Pájaros en máquina','Encogimientos','Crunch abdominal']}
];
const key='hrFitnessDataV1';
let data=JSON.parse(localStorage.getItem(key)||'null')||{routines:defaultRoutines,workouts:[],settings:{name:'Hernán',bodyWeight:202,goalWeight:177,theme:'light'}};
let activeRoutine=null;
const $=s=>document.querySelector(s); const $$=s=>document.querySelectorAll(s);
function save(){localStorage.setItem(key,JSON.stringify(data));}
function showView(id){$$('.view').forEach(v=>v.classList.toggle('active',v.id===id));$$('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===id));window.scrollTo(0,0);if(id==='historyView')renderHistory();}
function renderHome(){
 $('#routineList').innerHTML=''; data.routines.forEach((r,i)=>{const el=document.createElement('div');el.className='routine card';el.innerHTML=`<div><strong>${r.name}</strong><p>${r.exercises.length} ejercicios</p></div><span class="arrow">›</span>`;el.onclick=()=>openWorkout(i);$('#routineList').appendChild(el)});
 const now=new Date(); const month=data.workouts.filter(w=>{const d=new Date(w.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
 $('#monthWorkouts').textContent=month.length;let sets=0,vol=0;data.workouts.forEach(w=>w.exercises.forEach(e=>e.sets.forEach(s=>{sets++;vol+=(+s.weight||0)*(+s.reps||0)})));$('#totalSets').textContent=sets;$('#totalVolume').textContent=Math.round(vol).toLocaleString();
 $('.hero span').textContent=`Hola, ${data.settings.name||'Hernán'}`;
}
function lastForExercise(name){for(let i=data.workouts.length-1;i>=0;i--){const e=data.workouts[i].exercises.find(x=>x.name===name);if(e)return e;}return null;}
function openWorkout(index){activeRoutine=index;const routine=data.routines[index];$('#workoutTitle').textContent=routine.name;$('#exerciseList').innerHTML='';routine.exercises.forEach(name=>addExerciseCard(name));showView('workoutView');}
function addExerciseCard(name){const card=$('#exerciseTemplate').content.cloneNode(true);const root=card.querySelector('.exercise');root.dataset.name=name;card.querySelector('.exercise-name').textContent=name;const last=lastForExercise(name);card.querySelector('.last-session').textContent=last?'Última vez: '+last.sets.map(s=>`${s.weight}×${s.reps}`).join(' · '):'Sin registros anteriores';const list=card.querySelector('.sets-list');const starter=last?last.sets:[{weight:'',reps:''},{weight:'',reps:''},{weight:'',reps:''}];starter.forEach(s=>addSetRow(list,s));card.querySelector('.add-set').onclick=()=>addSetRow(list,{weight:'',reps:''});$('#exerciseList').appendChild(card);}
function addSetRow(list,set){const row=document.createElement('div');row.className='set-row';row.innerHTML=`<span class="set-number"></span><input class="weight" type="number" inputmode="decimal" value="${set.weight??''}" placeholder="0"><input class="reps" type="number" inputmode="numeric" value="${set.reps??''}" placeholder="0"><button class="remove-set">×</button>`;row.querySelector('.remove-set').onclick=()=>{row.remove();renumber(list)};list.appendChild(row);renumber(list);}
function renumber(list){[...list.children].forEach((r,i)=>r.querySelector('.set-number').textContent=i+1)}
function finishWorkout(){const routine=data.routines[activeRoutine];const exercises=[...$$('.exercise')].map(card=>({name:card.dataset.name,sets:[...card.querySelectorAll('.set-row')].map(r=>({weight:+r.querySelector('.weight').value||0,reps:+r.querySelector('.reps').value||0})).filter(s=>s.weight>0||s.reps>0)})).filter(e=>e.sets.length);if(!exercises.length){alert('Registra al menos una serie.');return;}data.workouts.push({id:Date.now(),date:new Date().toISOString(),routine:routine.name,exercises});save();renderHome();showView('homeView');alert('Entrenamiento guardado ✅');}
function renderHistory(){const wrap=$('#historyList');wrap.innerHTML='';if(!data.workouts.length){wrap.innerHTML='<div class="card history-item"><p>Todavía no hay entrenamientos guardados.</p></div>';return;}[...data.workouts].reverse().forEach(w=>{let vol=0,sets=0;w.exercises.forEach(e=>e.sets.forEach(s=>{sets++;vol+=s.weight*s.reps}));const el=document.createElement('div');el.className='card history-item';el.innerHTML=`<h3>${w.routine}</h3><p>${new Date(w.date).toLocaleString('es-US',{dateStyle:'medium',timeStyle:'short'})}</p><p>${sets} series · ${Math.round(vol).toLocaleString()} lb de volumen</p><div class="history-details">${w.exercises.map(e=>`<strong>${e.name}</strong><br>${e.sets.map(s=>`${s.weight} lb × ${s.reps}`).join(' · ')}`).join('<br><br>')}</div>`;wrap.appendChild(el);});}
function applySettings(){document.body.classList.toggle('dark',data.settings.theme==='dark');$('#themeBtn').textContent=data.settings.theme==='dark'?'☀':'☾';$('#userName').value=data.settings.name||'';$('#bodyWeight').value=data.settings.bodyWeight||'';$('#goalWeight').value=data.settings.goalWeight||'';}
$('#themeBtn').onclick=()=>{data.settings.theme=data.settings.theme==='dark'?'light':'dark';save();applySettings()};$('#startBtn').onclick=()=>openWorkout(0);$('#backBtn').onclick=()=>showView('homeView');$('#finishBtn').onclick=finishWorkout;$$('.nav-item').forEach(b=>b.onclick=()=>showView(b.dataset.view));
$('#saveSettings').onclick=()=>{data.settings.name=$('#userName').value.trim()||'Hernán';data.settings.bodyWeight=+$('#bodyWeight').value||'';data.settings.goalWeight=+$('#goalWeight').value||'';save();renderHome();alert('Ajustes guardados')};
$('#exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hr-fitness-backup.json';a.click();URL.revokeObjectURL(a.href)};
$('#importInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();applySettings();renderHome();alert('Copia importada correctamente')}catch{alert('Archivo no válido')}};r.readAsText(f)};
$('#resetBtn').onclick=()=>{if(confirm('¿Seguro que quieres borrar todos los datos?')){localStorage.removeItem(key);location.reload()}};

applySettings();renderHome();

  </script>
</body>
</html>
